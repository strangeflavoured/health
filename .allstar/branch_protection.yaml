optConfig:
  optIn: true
action: issue

enforceDefault: false
enforceOnAdmins: false
requireSignedCommits: true

requireStatusChecks:
  contexts:
    - "CodeQL Advanced / Analyze (actions)"
    - "CodeQL Advanced / Analyze (javascript)"
    - "CodeQL Advanced / Analyze (python)"
    - "docker-stack / Ran Docker Stack Integration"
    - "OSV Scan / osv-scan"
    - "pre-commit / Run pre-commit hooks"
    - "Scorecard / scorecard"
    - "Run Scripts Tests / Passed Scripts Tests"
    - "Build Sphinx Docs / Built Docs"
    - "Run Tests / Passed Tests"
    - "DCO"

approvalConfig:
  enforceApprovalRequirement: true
  requiredApprovals: 1
  dismissStaleApprovals: false
