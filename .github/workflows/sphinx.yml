name: Build Sphinx Docs

concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:
    inputs:
      upload-artifact:
        default: false
        type: boolean
    outputs:
      artifact-id:
        description: "ID of the uploaded docs artifact"
        value: ${{ jobs.build-docs.outputs.artifact-id }}

permissions: {}

jobs:
  changes:
    name: Detect Changes
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docs:
              - '.github/workflows/sphinx.yml'
              - 'backend/**'
              - 'docker/compose.yml'
              - 'docker/docker-bake.hcl'
              - 'docker/Dockerfile.docs*'
              - 'docs/**'
              - 'frontend/**'
              - 'src/**'

  build-docs:
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    env:
      COMPOSE_FILE: docker/compose.yml
      REDIS_DB: "0"
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_INSIGHT_PORT: "5540"
      REDIS_PORT: "6380"
      SECRETS_DIR: ""
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: v2.40.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - name: Build docs container
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          files: docker/docker-bake.hcl
          load: true
          targets: docs

      - name: Fetch badge snapshots
        if: inputs.upload-artifact == true
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p ./badges

          # GitHub Actions workflow badges
          grep -oP 'https://github\.com/[^/]+/[^/]+/actions/workflows/[^/]+\.yml/badge\.svg[^)]*' README.md \
            | while IFS= read -r url; do
                name=$(echo "$url" | grep -oP '(?<=/workflows/)[^/]+(?=\.yml)')
                curl -sL "$url" -o "./badges/${name}.svg"
                echo "Fetched: ${name}.svg from ${url}"
              done

          # shields.io badges
          grep -oP 'https://img\.shields\.io/[^\s)\"]+' README.md \
            | while IFS= read -r url; do
                # Derive a stable slug from the URL path (strip domain, replace special chars)
                slug=$(echo "$url" | sed 's|https://img\.shields\.io/||; s|[/?=&.]|_|g; s|_svg$||; s|__*|_|g; s|_$||')
                curl -sL "$url" -o "./badges/shields_${slug}.svg"
                echo "Fetched: shields_${slug}.svg from ${url}"

                # Build a sed rewrite rule for this URL
                # Escape regex metacharacters for use as a sed pattern
                safe_url=$(printf '%s' "$url" | sed 's|[.[\*^$()+?{]|\\&|g')
                owner="$REPO_OWNER"
                repo="$REPO_NAME"
                ref="$REF_NAME"
                replacement="https://${owner}.github.io/${repo}/${ref}/badges/shields_${slug}.svg"
                echo "s|${safe_url}|${replacement}|g" >> ./badges/.shields_rewrites.sed
              done

          # bestpractices badges
          grep -oP 'https://www\.bestpractices\.dev/projects/12933/[^)]*' README.md \
            | while IFS= read -r url; do
                name=bestpractices_$(echo "$url" | grep -oP '(?<=/12933/)[^/]+')
                curl -sL "$url" -o "./badges/${name}.svg"
                echo "Fetched: ${name}.svg from ${url}"
              done

      - name: Rewrite badge URLs for docs
        if: inputs.upload-artifact == true
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # GitHub Actions workflow badges (regex-reconstructible)
          pattern='https://github\.com/([^/]+)/([^/]+)/actions/workflows/([^/]+)\.yml/badge\.svg[^)]*'
          replace="https://\1.github.io/\2/$REF_NAME/badges/\3.svg"
          sed -i -E "s|${pattern}|${replace}|g" README.md

          # shields.io badges (apply pre-built rewrite rules from fetch step)
          if [ -f ./badges/.shields_rewrites.sed ]; then
            sed -i -f ./badges/.shields_rewrites.sed README.md
          fi

          # bestpractices badges
          pattern="https://www\.bestpractices\.dev/projects/12933/([^)]*)"
          owner="$REPO_OWNER"
          repo="$REPO_NAME"
          ref="$REF_NAME"
          replace="https://${owner}.github.io/${repo}/${ref}/badges/bestpractices_\1.svg"
          sed -i -E "s|${pattern}|${replace}|g" README.md

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            docs-compiler:
              image: health-docs
              build: !reset null
              volumes: !reset
                - README.md:/home/health/README.md
          EOF
          echo "COMPOSE_FILE=docker/compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Build docs
        run: |
          docker compose --project-directory . run --name docs docs-compiler
          docker cp docs:/home/health/docs/build/html ./_site
          docker rm docs

      - name: Clean up build container
        if: always()
        run: docker rm -f docs || true

      - name: Upload docs artifact
        id: upload
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: |
            _site
            badges
            versions.json

  ci-success:
    name: Built Docs
    needs: [changes, build-docs]
    if: always() && github.ref_name != 'workflow_call'
    runs-on: ubuntu-latest

    steps:
      - name: Verify no failures
        env:
          CHANGES_RESULT: "${{ needs.changes.result }}"
          BUILD_RESULT: "${{ needs.build-docs.result }}"
        run: |
          if [[ "$CHANGES_RESULT" == "failure" ]] || \
             [[ "$BUILD_RESULT" == "failure" ]]; then
            exit 1
          fi
