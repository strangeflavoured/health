name: Build Sphinx Docs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: false
    outputs:
      artifact-id:
        description: "ID of the uploaded docs artifact"
        value: ${{ jobs.build-docs.outputs.artifact-id }}

concurrency:
  group: sphinx
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            docs:
              - 'backend/**'
              - 'compose.yml'
              - 'docker/Dockerfile.docs'
              - 'docs/**'
              - 'frontend/**'
              - 'src/**'

  build-docs:
    runs-on: ubuntu-latest
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"
      SECRETS_DIR: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: v2.40.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Build docs container
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          files: docker/docker-bake.hcl
          targets: docs
          load: true

      - name: Fetch badge snapshots
        if: inputs.upload-artifact == true
        run: |
          mkdir -p ./badges
          grep -oP 'https://github\.com/[^/]+/[^/]+/actions/workflows/[^/]+\.yml/badge\.svg[^)]*' README.md \
            | while IFS= read -r url; do
                name=$(echo "$url" | grep -oP '(?<=/workflows/)[^/]+(?=\.yml)')
                curl -sL "$url" -o "./badges/${name}.svg"
                echo "Fetched: ${name}.svg from ${url}"
              done

      - name: Rewrite badge URLs for docs
        if: inputs.upload-artifact == true
        run: |
          sed -i -E \
            's|https://github\.com/([^/]+)/([^/]+)/actions/workflows/([^/]+)\.yml/badge\.svg[^)]*|https://\1.github.io/\2/${{ github.ref_name }}/badges/\3.svg|g' \
            README.md

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            docs-compiler:
              image: health-docs
              build: !reset null
              volumes: !reset
                - README.md:/home/health/README.md
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Build docs
        run: |
          docker compose run --name docs docs-compiler
          docker cp docs:/home/health/docs/build/html ./_site
          docker rm docs

      - name: Clean up build container
        if: always()
        run: docker rm -f docs || true

      - name: Upload docs artifact
        if: inputs.upload-artifact == true
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: |
            _site
            badges
            versions.json

  ci-success:
    name: Built Docs
    needs: [ changes, build-docs ]
    if: always() && github.ref_name != 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.build-docs.result }}" == "failure" ]]; then
            exit 1
          fi
