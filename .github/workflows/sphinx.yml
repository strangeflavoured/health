name: Deploy Sphinx Docs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    name: Build docs
    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"
      SECRETS_DIR: ""

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build docs container
        uses: docker/bake-action@v5
        with:
          files: docker/docker-bake.hcl
          targets: docs
          load: true

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            docs-compiler:
              image: health-docs
              build: !reset null
              volumes: !reset []
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Build docs
        run: |
          docker compose run --name docs docs-compiler
          docker cp docs:/home/health/docs/build/html ./_site
          docker rm docs

      - name: Clean up build container
        if: always()
        run: docker rm -f docs || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-docs
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
