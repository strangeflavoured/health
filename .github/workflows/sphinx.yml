name: Deploy Sphinx Docs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: "Deploy to Pages?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            docs:
              - 'backend/**'
              - 'compose.yml'
              - 'docker/Dockerfile.docs'
              - 'docs/**'
              - 'frontend/**'
              - 'src/**'

  build-docs:
    runs-on: ubuntu-latest
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"
      SECRETS_DIR: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Build docs container
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          files: docker/docker-bake.hcl
          targets: docs
          load: true

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            docs-compiler:
              image: health-docs
              build: !reset null
              volumes: !reset []
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Build docs
        run: |
          docker compose run --name docs docs-compiler
          docker cp docs:/home/health/docs/build/html ./_site
          docker rm docs

      - name: Clean up build container
        if: always()
        run: docker rm -f docs || true

      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: _site

  ci-success:
    name: Built Docs
    needs: [ changes, build-docs ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.build-docs.result }}" == "failure" ]]; then
            exit 1
          fi

  deploy:
    needs: [ changes, build-docs ]
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v') && inputs.deploy_to_pages == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-site
          path: ./dist

      - name: Assemble publish tree
        run: |
          mkdir -p ./publish/${{ github.ref_name }}
          cp -r ./dist/. ./publish/${{ github.ref_name }}/
          cat > ./publish/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
           <meta http-equiv="refresh" content="0; url=${{ github.ref_name }}/">
           <script>window.location.replace("${{ github.ref_name }}/");</script>
           <title>Redirecting to ${{ github.ref_name }}...</title>
          </head>
          <body>
           <a href="${{ github.ref_name }}/">Click here if not redirected</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          keep_files: true
