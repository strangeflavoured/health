name: Deploy Sphinx Docs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            docs:
              - 'backend/**'
              - 'compose.yml'
              - 'docker/Dockerfile.docs'
              - 'docs/**'
              - 'frontend/**'
              - 'src/**'

  build-docs:
    runs-on: ubuntu-latest
    name: Build docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"
      SECRETS_DIR: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Build docs container
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          files: docker/docker-bake.hcl
          targets: docs
          load: true

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            docs-compiler:
              image: health-docs
              build: !reset null
              volumes: !reset []
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Build docs
        run: |
          docker compose run --name docs docs-compiler
          docker cp docs:/home/health/docs/build/html ./_site
          docker rm docs

      - name: Clean up build container
        if: always()
        run: docker rm -f docs || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  ci-success:
    name: Built Docs
    needs: [ changes, build-docs ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.build-docs.result }}" == "failure" ]]; then
            exit 1
          fi

  deploy:
    needs: [ changes, build-docs ]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
