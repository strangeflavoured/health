name: docker-stack

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      integration: ${{ steps.filter.outputs.integration }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      any: ${{ steps.filter.outputs.changes != '[]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            integration:
              - 'backend/**'
              - 'compose.yml'
              - 'docker/**'
              - 'frontend/**'
              - 'src/**'
            sandbox:
              - 'compose.yml'
              - 'docker/Dockerfile.sandbox'
              - 'scripts/**'

  stack:
    name: Docker Stack Integration Test
    needs: [ changes ]
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"

      # Secrets injected from the repo's GH Actions secrets.
      REDIS_CERT_CA:            ${{ secrets.REDIS_CERT_CA }}
      REDIS_CERT_SERVER:        ${{ secrets.REDIS_CERT_SERVER }}
      REDIS_CERT_HEALTHCHECK:   ${{ secrets.REDIS_CERT_HEALTHCHECK }}
      REDIS_CERT_REDISINSIGHT:  ${{ secrets.REDIS_CERT_REDISINSIGHT }}
      REDIS_CERT_APP:           ${{ secrets.REDIS_CERT_APP }}

      REDIS_KEY_SERVER:         ${{ secrets.REDIS_KEY_SERVER }}
      REDIS_KEY_HEALTHCHECK:    ${{ secrets.REDIS_KEY_HEALTHCHECK }}
      REDIS_KEY_REDISINSIGHT:   ${{ secrets.REDIS_KEY_REDISINSIGHT }}
      REDIS_KEY_APP:            ${{ secrets.REDIS_KEY_APP }}

      REDIS_PASSWORD_ADMIN:        ${{ secrets.REDIS_PASSWORD_ADMIN }}
      REDIS_PASSWORD_APP:          ${{ secrets.REDIS_PASSWORD_APP }}
      REDIS_PASSWORD_HEALTHCHECK:  ${{ secrets.REDIS_PASSWORD_HEALTHCHECK }}
      REDIS_PASSWORD_INSIGHT:      ${{ secrets.REDIS_PASSWORD_INSIGHT }}

      REDIS_HASH_ADMIN:        ${{ secrets.REDIS_HASH_ADMIN }}
      REDIS_HASH_APP:          ${{ secrets.REDIS_HASH_APP }}
      REDIS_HASH_HEALTHCHECK:  ${{ secrets.REDIS_HASH_HEALTHCHECK }}
      REDIS_HASH_INSIGHT:      ${{ secrets.REDIS_HASH_INSIGHT }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Build Integration images via bake
        uses: docker/bake-action@4a9a8d494466d37134e2bfca2d3a8de8fb2681ad # v5.13.0
        with:
          files: docker/docker-bake.hcl
          targets: |
            infra
            dev
          load: true

      - name: Build Integration images via bake
        uses: docker/bake-action@4a9a8d494466d37134e2bfca2d3a8de8fb2681ad # v5.13.0
        if: needs.changes.outputs.sandbox == 'true'
        with:
          files: docker/docker-bake.hcl
          targets: sandbox
          load: true

      - name: Materialize secrets from GH Actions secrets
        run: |
          chmod +x scripts/load-ci-secrets.sh
          ./scripts/load-ci-secrets.sh
          echo "SECRETS_DIR=/dev/shm/health-secrets-$(id -u)" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            redis:
              image: health-redis
              build: !reset null
              restart: on-failure
            redisinsight:
              image: health-redisinsight
              build: !reset null
            sandbox:
              image: health-sandbox
              build: !reset null
              # Drop the data mounts
              volumes: !reset
                - ./output:/home/health/output
            backend:
              image: health-backend:dev
              build: !reset null
              restart: on-failure
            frontend:
              image: health-frontend:dev
              build: !reset null
              restart: on-failure
              user: root
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Start persistent containers
        run: docker compose up -d redis redisinsight backend frontend

      - name: Wait for containers to be healthy
        run: |
          redis_healthy=false
          backend_healthy=false
          frontend_healthy=false
          n_tries=20
          for ((i=1; i<=n_tries; i++)); do
            if ! $redis_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-redis 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] redis health: $status"
              if [[ "$status" == "healthy" ]]; then
                redis_healthy=true
              fi
            fi

            if ! $backend_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-backend 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] backend health: $status"
              if [[ "$status" == "healthy" ]]; then
                backend_healthy=true
              fi
            fi

            if ! $frontend_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-frontend 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] frontend health: $status"
              if [[ "$status" == "healthy" ]]; then
                frontend_healthy=true
              fi
            fi

            if $redis_healthy && $backend_healthy && $frontend_healthy; then exit 0; fi
            sleep 5
          done

          if ! $redis_healthy; then
            echo "redis did not become healthy in time"
            docker compose logs redis
            docker inspect --format='{{json .State.Health}}' health-redis | jq
          fi

          if ! $backend_healthy; then
            echo "backend did not become healthy in time"
            docker compose logs backend
            docker inspect --format='{{json .State.Health}}' health-backend | jq
          fi

          if ! $frontend_healthy; then
            echo "frontend did not become healthy in time"
            docker compose logs frontend
            docker inspect --format='{{json .State.Health}}' health-frontend | jq
          fi

          exit 1

      - name: Run sandbox
        if: needs.changes.outputs.sandbox == 'true'
        run: docker compose run sandbox

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::redis logs"
          docker compose logs redis || true
          echo "::endgroup::"
          echo "::group::redisinsight logs"
          docker compose logs redisinsight || true
          echo "::endgroup::"
          echo "::group::backend logs"
          docker compose logs backend || true
          echo "::endgroup::"
          echo "::group::frontend logs"
          docker compose logs frontend || true
          echo "::endgroup::"
          echo "::group::sandbox logs"
          docker compose logs sandbox || true
          echo "::endgroup::"
          echo "::group::compose ps"
          docker compose ps -a || true
          echo "::endgroup::"

      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          rm -rf "${SECRETS_DIR:-}" || true

  ci-success:
    name: Ran Stack
    needs: [ changes, stack ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.stack.result }}" == "failure" ]]; then
            exit 1
          fi
