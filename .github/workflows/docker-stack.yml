name: docker-stack

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  changes:
    name: Detect Changes
    outputs:
      any: ${{ steps.filter.outputs.changes != '[]' }}
      integration: ${{ steps.filter.outputs.integration == 'true' || steps.filter.outputs.all == 'true' }}
      sandbox: ${{ steps.filter.outputs.sandbox == 'true' || steps.filter.outputs.all == 'true' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            all:
              - '.github/workflows/docker-stack.yml'
              - 'docker/compose.yml'
              - 'docker/docker-bake.hcl'
              - 'src/**'
            integration:
              - 'backend/**'
              - 'docker/Dockerfile.redis*'
              - 'docker/Dockerfile.backend*'
              - 'docker/Dockerfile.frontend*'
              - 'frontend/**'
            sandbox:
              - 'docker/Dockerfile.sandbox*'
              - 'scripts/**'

  stack:
    name: Docker Stack Integration Test
    needs: [changes]
    if: |
      needs.changes.outputs.any == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_FILE: docker/compose.yml
      REDIS_CERT_APP: ${{ secrets.REDIS_CERT_APP }}
      # Secrets injected from the repo's GH Actions secrets.
      REDIS_CERT_CA: ${{ secrets.REDIS_CERT_CA }}
      REDIS_CERT_HEALTHCHECK: ${{ secrets.REDIS_CERT_HEALTHCHECK }}
      REDIS_CERT_REDISINSIGHT: ${{ secrets.REDIS_CERT_REDISINSIGHT }}
      REDIS_CERT_SERVER: ${{ secrets.REDIS_CERT_SERVER }}
      REDIS_DB: "0"
      REDIS_HASH_ADMIN: ${{ secrets.REDIS_HASH_ADMIN }}
      REDIS_HASH_APP: ${{ secrets.REDIS_HASH_APP }}
      REDIS_HASH_HEALTHCHECK: ${{ secrets.REDIS_HASH_HEALTHCHECK }}
      REDIS_HASH_INSIGHT: ${{ secrets.REDIS_HASH_INSIGHT }}
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_INSIGHT_PORT: "5540"
      REDIS_KEY_APP: ${{ secrets.REDIS_KEY_APP }}
      REDIS_KEY_HEALTHCHECK: ${{ secrets.REDIS_KEY_HEALTHCHECK }}
      REDIS_KEY_REDISINSIGHT: ${{ secrets.REDIS_KEY_REDISINSIGHT }}
      REDIS_KEY_SERVER: ${{ secrets.REDIS_KEY_SERVER }}
      REDIS_PASSWORD_ADMIN: ${{ secrets.REDIS_PASSWORD_ADMIN }}
      REDIS_PASSWORD_APP: ${{ secrets.REDIS_PASSWORD_APP }}
      REDIS_PASSWORD_HEALTHCHECK: ${{ secrets.REDIS_PASSWORD_HEALTHCHECK }}
      REDIS_PASSWORD_INSIGHT: ${{ secrets.REDIS_PASSWORD_INSIGHT }}
      REDIS_PORT: "6380"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: v2.40.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - name: Build Integration images via bake
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          files: docker/docker-bake.hcl
          load: true
          targets: |
            infra
            dev

      - name: Build Integration images via bake
        if: needs.changes.outputs.sandbox == 'true'
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          files: docker/docker-bake.hcl
          load: true
          targets: sandbox

      - name: Materialize secrets from GH Actions secrets
        run: |
          chmod +x scripts/load-ci-secrets.sh
          ./scripts/load-ci-secrets.sh
          echo "SECRETS_DIR=/dev/shm/health-secrets-$(id -u)" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            redis:
              image: health-redis
              build: !reset null
              restart: on-failure
            redisinsight:
              image: health-redisinsight
              build: !reset null
            sandbox:
              image: health-sandbox
              build: !reset null
              # Drop the data mounts
              volumes: !reset
                - ./output:/home/health/output
            backend:
              image: health-backend:dev
              build: !reset null
              restart: on-failure
            frontend:
              image: health-frontend:dev
              build: !reset null
              restart: on-failure
              user: root
          EOF
          echo "COMPOSE_FILE=docker/compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Start persistent containers
        run: docker compose --project-directory . up -d redis redisinsight backend frontend

      - name: Wait for containers to be healthy
        run: |
          redis_healthy=false
          backend_healthy=false
          frontend_healthy=false
          n_tries=20
          for ((i=1; i<=n_tries; i++)); do
            if ! $redis_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-redis 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] redis health: $status"
              if [[ "$status" == "healthy" ]]; then
                redis_healthy=true
              fi
            fi

            if ! $backend_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-backend 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] backend health: $status"
              if [[ "$status" == "healthy" ]]; then
                backend_healthy=true
              fi
            fi

            if ! $frontend_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-frontend 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] frontend health: $status"
              if [[ "$status" == "healthy" ]]; then
                frontend_healthy=true
              fi
            fi

            if $redis_healthy && $backend_healthy && $frontend_healthy; then exit 0; fi
            sleep 5
          done

          if ! $redis_healthy; then
            echo "redis did not become healthy in time"
            docker compose --project-directory . logs redis
            docker inspect --format='{{json .State.Health}}' health-redis | jq
          fi

          if ! $backend_healthy; then
            echo "backend did not become healthy in time"
            docker compose --project-directory . logs backend
            docker inspect --format='{{json .State.Health}}' health-backend | jq
          fi

          if ! $frontend_healthy; then
            echo "frontend did not become healthy in time"
            docker compose --project-directory . logs frontend
            docker inspect --format='{{json .State.Health}}' health-frontend | jq
          fi

          exit 1

      - name: Run sandbox
        if: needs.changes.outputs.sandbox == 'true'
        run: docker compose --project-directory . run sandbox

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::redis logs"
          docker compose --project-directory . logs redis || true
          echo "::endgroup::"
          echo "::group::redisinsight logs"
          docker compose --project-directory . logs redisinsight || true
          echo "::endgroup::"
          echo "::group::backend logs"
          docker compose --project-directory . logs backend || true
          echo "::endgroup::"
          echo "::group::frontend logs"
          docker compose --project-directory . logs frontend || true
          echo "::endgroup::"
          echo "::group::sandbox logs"
          docker compose --project-directory . logs sandbox || true
          echo "::endgroup::"
          echo "::group::compose ps"
          docker compose --project-directory . ps -a || true
          echo "::endgroup::"

      - name: Tear down stack
        if: always()
        run: |
          docker compose --project-directory . down -v --remove-orphans || true
          rm -rf "${SECRETS_DIR:-}" || true

  ci-success:
    name: Ran Docker Stack Integration
    if: always()
    needs: [changes, stack]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        env:
          CHANGES_RESULT: "${{ needs.changes.result }}"
          STACK_RESULT: "${{ needs.stack.result }}"
        run: |
          if [[ "$CHANGES_RESULT" == "failure" ]] || \
             [[ "$STACK_RESULT" == "failure" ]]; then
            exit 1
          fi
