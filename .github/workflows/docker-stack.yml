name: docker-stack

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
  stack:
    name: Build and run full docker stack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"

      # Secrets injected from the repo's GH Actions secrets.
      REDIS_CERT_CA:            ${{ secrets.REDIS_CERT_CA }}
      REDIS_CERT_SERVER:        ${{ secrets.REDIS_CERT_SERVER }}
      REDIS_CERT_HEALTHCHECK:   ${{ secrets.REDIS_CERT_HEALTHCHECK }}
      REDIS_CERT_REDISINSIGHT:  ${{ secrets.REDIS_CERT_REDISINSIGHT }}
      REDIS_CERT_APP:           ${{ secrets.REDIS_CERT_APP }}

      REDIS_KEY_SERVER:         ${{ secrets.REDIS_KEY_SERVER }}
      REDIS_KEY_HEALTHCHECK:    ${{ secrets.REDIS_KEY_HEALTHCHECK }}
      REDIS_KEY_REDISINSIGHT:   ${{ secrets.REDIS_KEY_REDISINSIGHT }}
      REDIS_KEY_APP:            ${{ secrets.REDIS_KEY_APP }}

      REDIS_PASSWORD_ADMIN:        ${{ secrets.REDIS_PASSWORD_ADMIN }}
      REDIS_PASSWORD_APP:          ${{ secrets.REDIS_PASSWORD_APP }}
      REDIS_PASSWORD_HEALTHCHECK:  ${{ secrets.REDIS_PASSWORD_HEALTHCHECK }}
      REDIS_PASSWORD_INSIGHT:      ${{ secrets.REDIS_PASSWORD_INSIGHT }}

      REDIS_HASH_ADMIN:        ${{ secrets.REDIS_HASH_ADMIN }}
      REDIS_HASH_APP:          ${{ secrets.REDIS_HASH_APP }}
      REDIS_HASH_HEALTHCHECK:  ${{ secrets.REDIS_HASH_HEALTHCHECK }}
      REDIS_HASH_INSIGHT:      ${{ secrets.REDIS_HASH_INSIGHT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'docker/**'
              - 'compose.yml'
              - 'compose.override.yml'
            backend:
              - 'backend/**'
              - 'docker/Dockerfile.backend'
            frontend:
              - 'frontend/**'
              - 'docker/Dockerfile.frontend'
            tests:
              - 'src/**'
              - 'tests/**'
              - 'docker/Dockerfile.tests'
            docs:
              - 'docs/**'
              - 'src/**'
              - 'docker/Dockerfile.docs'
            sandbox:
              - 'scripts/**'
              - 'docker/Dockerfile.sandbox'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build all images via bake
        uses: docker/bake-action@v5
        with:
          files: docker/docker-bake.hcl
          load: true

      # ---- Materialize secrets ----
      - name: Materialize secrets from GH Actions secrets
        run: |
          chmod +x scripts/load-ci-secrets.sh
          ./scripts/load-ci-secrets.sh
          echo "SECRETS_DIR=/dev/shm/health-secrets-$(id -u)" >> "$GITHUB_ENV"

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      # ---- Generate compose override that pins prebuilt images ----
      - name: Write compose override
        run: |
          # create directory for test coverage output
          mkdir -p test-output coverage-data
          sudo chown -R 1000:1000 test-output coverage-data

          cat > compose.ci.yml <<'EOF'
          services:
            redis:
              image: health-redis
              build: !reset null
              restart: on-failure
            redisinsight:
              image: health-redisinsight
              build: !reset null
            test-runner:
              image: health-test-runner
              build: !reset null
              environment:
                - COVERAGE_FILE=/home/health/coverage-data/.coverage
              volumes:
                - ./test-output:/home/health/test-output
                - ./coverage-data:/home/health/coverage-data
              command: >
                -p pytest_cov
                --tb=long -v
                --continue-on-collection-errors
                --no-header
                --cov-report=term-missing
                --cov-report=xml:/home/health/test-output/coverage.xml
                --cov-fail-under=80
                --junit-xml=/home/health/test-output/test-results.xml
                -p no:warnings
            docs-compiler:
              image: health-docs
              build: !reset null
              # Drop volumes
              volumes: !reset []
            sandbox:
              image: health-sandbox
              build: !reset null
              # Drop the data mounts
              volumes: !reset
                - ./output:/home/health/output
            backend:
              image: health-backend:dev
              build: !reset null
              restart: on-failure
            frontend:
              image: health-frontend:dev
              build: !reset null
              restart: on-failure
              user: root
            backend-test:
              extends: backend
              image: health-backend:test
              build: !reset null
            frontend-test:
              extends: frontend
              image: health-frontend:test
              build: !reset null
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      # ---- Redis + RedisInsight + Backend + Frontend ----
      - name: Start redis, redisinsight, backend and frontend
        run: docker compose up -d redis redisinsight backend frontend

      - name: Wait for containers to be healthy
        run: |
          redis_healthy=false
          backend_healthy=false
          frontend_healthy=false
          n_tries=20
          for ((i=1; i<=n_tries; i++)); do
            if ! $redis_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-redis 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] redis health: $status"
              if [[ "$status" == "healthy" ]]; then
                redis_healthy=true
              fi
            fi

            if ! $backend_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-backend 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] backend health: $status"
              if [[ "$status" == "healthy" ]]; then
                backend_healthy=true
              fi
            fi

            if ! $frontend_healthy; then
              status=$(docker inspect --format='{{.State.Health.Status}}' health-frontend 2>/dev/null || echo "missing")
              echo "[$i/$n_tries] frontend health: $status"
              if [[ "$status" == "healthy" ]]; then
                frontend_healthy=true
              fi
            fi

            if $redis_healthy && $backend_healthy && $frontend_healthy; then exit 0; fi
            sleep 5
          done

          if ! $redis_healthy; then
            echo "redis did not become healthy in time"
            docker compose logs redis
            docker inspect --format='{{json .State.Health}}' health-redis | jq
          fi

          if ! $backend_healthy; then
            echo "backend did not become healthy in time"
            docker compose logs backend
            docker inspect --format='{{json .State.Health}}' health-backend | jq
          fi

          if ! $frontend_healthy; then
            echo "frontend did not become healthy in time"
            docker compose logs frontend
            docker inspect --format='{{json .State.Health}}' health-frontend | jq
          fi

          exit 1

      # ---- Test runner, docs compiler, sandbox ----
      - name: Run test-runner
        id: test_runner
        if: always() && (steps.changes.outputs.tests == 'true' || steps.changes.outputs.docker == 'true')
        run: docker compose run test-runner

      - name: Upload JUnit test results
        if: always() && steps.test_runner.conclusion != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-output/test-results.xml
          retention-days: 30

      - name: Publish test results as PR check
        if: always() && github.event_name == 'pull_request' && steps.test_runner.conclusion != 'skipped'
        uses: dorny/test-reporter@v3
        with:
          name: Test Report
          path: test-output/test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Move coverage file to workspace root
        if: always() && steps.test_runner.conclusion != 'skipped'
        run: |
          cp coverage-data/.coverage .coverage
          ls -la .coverage

      - name: Post coverage comment
        if: always() && github.event_name == 'pull_request' && steps.test_runner.conclusion != 'skipped'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_BRANCH: python-coverage-comment-action-data
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

      - name: Run docs-compiler
        if: always() && (steps.changes.outputs.docs == 'true' || steps.changes.outputs.docker == 'true')
        run: docker compose run docs-compiler

      - name: Run sandbox
        if: always() && (steps.changes.outputs.sandbox == 'true' || steps.changes.outputs.docker == 'true')
        run: docker compose run sandbox

      # ---- Diagnostics on failure ----
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::redis logs"
          docker compose logs redis || true
          echo "::endgroup::"
          echo "::group::redisinsight logs"
          docker compose logs redisinsight || true
          echo "::endgroup::"
          echo "::group::backend logs"
          docker compose logs backend || true
          echo "::endgroup::"
          echo "::group::frontend logs"
          docker compose logs frontend || true
          echo "::endgroup::"
          echo "::group::test-runner logs"
          docker compose logs test-runner || true
          echo "::endgroup::"
          echo "::group::docs-compiler logs"
          docker compose logs docs-compiler || true
          echo "::endgroup::"
          echo "::group::sandbox logs"
          docker compose logs sandbox || true
          echo "::endgroup::"
          echo "::group::compose ps"
          docker compose ps -a || true
          echo "::endgroup::"

      # ---- Cleanup ----
      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          rm -rf "${SECRETS_DIR:-}" || true
