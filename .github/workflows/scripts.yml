name: Run Scripts Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      bash: ${{ steps.filter.outputs.bash == 'true' || steps.filter.outputs.all == 'true' }}
      python: ${{ steps.filter.outputs.python == 'true' || steps.filter.outputs.all == 'true' }}
      any: ${{ steps.filter.outputs.changes != '[]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            all:
              - 'docker/compose.yml'
            bash:
              - 'docker/Dockerfile.bats*'
              - 'scripts/**'
              - '!scripts/**/*.py'
            python:
              - 'docker/Dockerfile.tests*'
              - 'scripts/**'
              - '!scripts/**/*.sh'
              - '!scripts/**/*.bash'
              - '!scripts/**/*.bats'

  tests:
    name: Run Scripts Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'

    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"

      COMPOSE_FILE: docker/compose.yml

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: v2.40.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Build test images via bake
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          files: docker/docker-bake.hcl
          targets: scripts
          load: true

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            scripts-tests:
              build: !reset null
              command: >
                -p pytest_cov
                --tb=long -v
                --continue-on-collection-errors
                --no-header
                --junit-xml=/home/health/test-output/test-results-py-scripts.xml
                -p no:warnings
              image: health-scripts-test
              volumes:
                - ./test-output:/home/health/test-output
            bats-tests:
              build: !reset null
              command:
                - --formatter
                - junit
                - --output
                - /test-output
                - /home/health/scripts/tests
              image: health-bats-test
              volumes:
                - ./test-output:/test-output
          EOF
          echo "COMPOSE_FILE=docker/compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Prepare test output directory
        run: |
          mkdir -p test-output
          sudo chown -R 1000:1000 test-output

      - name: Run py scripts
        id: py_scripts
        if: always() && needs.changes.outputs.python == 'true'
        run: docker compose --project-directory . run scripts-tests

      - name: Run bash tests
        id: bash_scripts
        if: always() && needs.changes.outputs.bash == 'true'
        run: docker compose --project-directory . run bats-tests

      - name: Upload JUnit test results
        if: always() && (steps.py_scripts.conclusion != 'skipped' || steps.bash_scripts.conclusion != 'skipped')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-output/test*.xml
          retention-days: 30

      - name: Publish test results as PR check
        if: always() && github.event_name == 'pull_request' && (steps.py_scripts.conclusion != 'skipped' || steps.bash_scripts.conclusion != 'skipped')
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Test Report
          path: test-output/test*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::py-test logs"
          docker compose --project-directory . logs scripts-tests || true
          echo "::endgroup::"
          echo "::group::bash-test logs"
          docker compose --project-directory . logs bats-test || true
          echo "::endgroup::"
          echo "::group::compose ps"
          docker compose --project-directory . ps -a || true
          echo "::endgroup::"

      - name: Tear down stack
        if: always()
        run: |
          docker compose --project-directory . down -v --remove-orphans || true

      - name: Clean up test output
        if: always()
        run: sudo rm -rf ./test-output

  ci-success:
    name: Passed Scripts Tests
    needs: [changes, tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.tests.result }}" == "failure" ]]; then
            exit 1
          fi
