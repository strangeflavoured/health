name: Deploy Docs to GitHub Pages

concurrency:
  group: pages
  cancel-in-progress: false

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: "Deploy to Pages?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions: {}

jobs:
  build-docs:
    uses: ./.github/workflows/sphinx.yml
    with:
      upload-artifact: true

  deploy:
    needs: build-docs
    if: |
      (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' &&
      startsWith(github.ref, 'refs/tags/v') && inputs.deploy_to_pages == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build-docs.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./dist

      - name: Assemble publish tree
        env:
          REF_NAME: "${{ github.ref_name }}"
        run: |
          mkdir -p ./publish/$REF_NAME
          cp -r ./dist/_site/. ./publish/$REF_NAME/
          mkdir -p ./publish/$REF_NAME/badges
          if [ -d ./dist/badges ] && [ -n "$(ls -A ./dist/badges)" ]; then
            cp -r ./dist/badges/. ./publish/$REF_NAME/badges/
          fi
          mv ./dist/versions.json ./publish/versions.json

          cat > ./publish/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
           <meta http-equiv="refresh" content="0; url=$REF_NAME/">
           <script>window.location.replace("$REF_NAME/");</script>
           <title>Redirecting to $REF_NAME...</title>
          </head>
          <body>
           <a href="$REF_NAME/">Click here if not redirected</a>
          </body>
          </html>
          EOF

      - name: Attest docs artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ./dist/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          keep_files: true
