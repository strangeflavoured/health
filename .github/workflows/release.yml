name: Release

concurrency:
  group: pages
  cancel-in-progress: false

on:
  release:
    types:
      - published
permissions: {}

env:
  IS_RELEASE_RUN: >-
    ${{
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
       startsWith(github.ref, 'refs/tags/v') &&
       inputs.deploy_to_pages == 'true')
    }}

jobs:
  pre-release-scan:
    name: Pre-release security scan
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: OSV scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

  build-docs:
    uses: ./.github/workflows/sphinx.yml
    with:
      upload-artifact: true

  generate-sbom:
    name: Generate SBOM
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.cyclonedx.json
          retention-days: 90

  generate-vex:
    name: Generate OpenVEX document
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      filename: ${{ steps.generate.outputs.filename }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install vexctl
        env:
          # renovate: datasource=github-releases depName=openvex/vexctl
          VEXCTL_VERSION: "0.2.6"
        run: GOBIN=/usr/local/bin go install github.com/openvex/vexctl@v${VEXCTL_VERSION}

      - name: Generate VEX document
        id: generate
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PRODUCT_PURL="pkg:github/${REPO}@${TAG}"
          DOC_ID="https://github.com/${REPO}/releases/tag/${TAG}/vex"
          OUTFILE="release-${TAG}.openvex.json"

          if compgen -G ".vex/*.vex.json" > /dev/null 2>&1; then
            # Triage files exist — merge them into a release-specific document.
            # Each file under .vex/ is a single-statement OpenVEX document
            # maintained by the security team. vexctl merge deduplicates and
            # re-timestamps the combined document.
            echo "Merging $(ls .vex/*.vex.json | wc -l) triage file(s) into ${OUTFILE}..."
            vexctl merge \
              --product "${PRODUCT_PURL}" \
              --output "${OUTFILE}" \
              .vex/*.vex.json
          else
            # No triage files yet. Create a minimal document that identifies
            # the product at this release. Statements are added after release
            # as CVEs are triaged; the next release will include them.
            echo "No triage files found — creating skeleton document ${OUTFILE}..."
            python3 - <<PYEOF
          import json, datetime, os
          doc = {
              "@context": "https://openvex.dev/ns/v0.2.0",
              "@id": os.environ["DOC_ID"],
              "author": "https://github.com/" + os.environ["REPO"],
              "role": "Document Creator",
              "timestamp": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "version": 1,
              "statements": []
          }
          with open(os.environ["OUTFILE"], "w") as f:
              json.dump(doc, f, indent=2)
              f.write("\n")
          PYEOF
          fi

          echo "Contents of ${OUTFILE}:"
          cat "${OUTFILE}"
          echo "filename=${OUTFILE}" >> "$GITHUB_OUTPUT"

      - name: Upload VEX artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vex-${{ github.ref_name }}
          path: ${{ steps.generate.outputs.filename }}
          retention-days: 90

  deploy:
    name: Deploy to GitHub Pages
    needs: [build-docs, pre-release-scan, generate-sbom, generate-vex]
    if: |
      always() &&
      needs.build-docs.result == 'success' &&
      (needs.pre-release-scan.result  == 'success' || needs.pre-release-scan.result  == 'skipped') &&
      (needs.generate-sbom.result     == 'success' || needs.generate-sbom.result     == 'skipped') &&
      (needs.generate-vex.result      == 'success' || needs.generate-vex.result      == 'skipped')
    runs-on: ubuntu-latest
    environment: release

    permissions:
      attestations: write # actions/attest-build-provenance
      contents: write # gh-pages deploy + changelog commit + gh release upload
      id-token: write # actions/attest-build-provenance (Sigstore OIDC)

    steps:
      - name: Download built docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build-docs.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./dist

      - name: Download SBOM
        if: needs.generate-sbom.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.generate-sbom.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./sbom

      - name: Download VEX document
        if: needs.generate-vex.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.generate-vex.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./vex

      - name: Assemble publish tree
        env:
          REF_NAME: "${{ github.ref_name }}"
        run: |
          mkdir -p ./publish/$REF_NAME
          cp -r ./dist/_site/. ./publish/$REF_NAME/
          mkdir -p ./publish/$REF_NAME/badges
          if [ -d ./dist/badges ] && [ -n "$(ls -A ./dist/badges)" ]; then
            cp -r ./dist/badges/. ./publish/$REF_NAME/badges/
          fi
          mv ./dist/versions.json ./publish/versions.json

          cat > ./publish/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
           <meta http-equiv="refresh" content="0; url=$REF_NAME/">
           <script>window.location.replace("$REF_NAME/");</script>
           <title>Redirecting to $REF_NAME...</title>
          </head>
          <body>
           <a href="$REF_NAME/">Click here if not redirected</a>
          </body>
          </html>
          EOF

      - name: Attest docs artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./dist/_site/**"

      - name: Attest SBOM
        if: needs.generate-sbom.result == 'success'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./sbom/sbom.cyclonedx.json"

      - name: Attest VEX document
        if: needs.generate-vex.result == 'success'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "./vex/${{ needs.generate-vex.outputs.filename }}"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          keep_files: true

      - name: Attach SBOM and VEX to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          VEX_FILENAME: ${{ needs.generate-vex.outputs.filename }}
        run: |
          if [ -f "./sbom/sbom.cyclonedx.json" ]; then
            gh release upload "$TAG" \
              "./sbom/sbom.cyclonedx.json#SBOM (CycloneDX JSON)" \
              --clobber
          fi

          if [ -n "$VEX_FILENAME" ] && [ -f "./vex/${VEX_FILENAME}" ]; then
            gh release upload "$TAG" \
              "./vex/${VEX_FILENAME}#Security advisories (OpenVEX)" \
              --clobber
          fi

      - name: Generate app token for changelog commit
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          permission-contents: write
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Update CHANGELOG.md
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          TAG: ${{ github.event.release.tag_name }}
          DATE: ${{ github.event.release.published_at }}
        run: |
          tmp=$(mktemp)
          printf "## [%s] - %s\n\n%s\n\n" \
            "${TAG}" "${DATE:0:10}" "${RELEASE_BODY}" > "$tmp"
          if [ -f CHANGELOG.md ]; then
            head -1 CHANGELOG.md >> "$tmp"
            echo >> "$tmp"
            tail -n +2 CHANGELOG.md >> "$tmp"
          fi
          mv "$tmp" CHANGELOG.md

      - name: Commit changelog
        env:
          APP_SLUG: "${{ steps.app-token.outputs.app-slug }}"
          TAG: ${{ github.event.release.tag_name }}
        run: |
          git config user.name  "$APP_SLUG[bot]"
          git config user.email "$APP_SLUG[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Exit cleanly if nothing changed (e.g. empty release body)
          git diff --cached --quiet && exit 0
          git commit -m "chore: update changelog for ${TAG}"
          git push
