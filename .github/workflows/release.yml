name: Deploy Docs to GitHub Pages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: "Deploy to Pages?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-docs:
    uses: ./.github/workflows/sphinx.yml

  deploy:
    needs: build-docs
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v') && inputs.deploy_to_pages == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-site
          path: ./dist

      - name: Fetch badge snapshots
        run: |
          mkdir -p ./dist/badges
          # Extract all workflow badge URLs from README.md
          grep -oP 'https://github\.com/[^/]+/[^/]+/actions/workflows/[^/]+\.yml/badge\.svg[^)]*' README.md \
            | while IFS= read -r url; do
                # Derive filename from workflow name, e.g. codeql.yml -> codeql.svg
                name=$(echo "$url" | grep -oP '(?<=/workflows/)[^/]+(?=\.yml)')
                curl -sL "$url" -o "./dist/badges/${name}.svg"
                echo "Fetched: ${name}.svg from ${url}"
              done

      - name: Assemble publish tree
        run: |
          cp -r ./dist/. ./publish/${{ github.ref_name }}/
          mv ./dist/versions.json ./publish/versions.json

          cat > ./publish/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
           <meta http-equiv="refresh" content="0; url=${{ github.ref_name }}/">
           <script>window.location.replace("${{ github.ref_name }}/");</script>
           <title>Redirecting to ${{ github.ref_name }}...</title>
          </head>
          <body>
           <a href="${{ github.ref_name }}/">Click here if not redirected</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          keep_files: true
