name: Requirements Maintenance

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      requirements: ${{ steps.filter.outputs.requirements }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            requirements:
              - '**/{requirements,*-requirements,requirements-*}.in'
              - '**/{requirements,*-requirements,requirements-*}.txt'
              - '**/requirements/*.in'
              - '**/requirements/*.txt'

  analyse:
    name: Analyse dependencies
    needs: changes
    if: needs.changes.outputs.requirements == 'true'
    runs-on: ubuntu-latest

    outputs:
      ordered_groups: ${{ steps.dag.outputs.ordered_groups }}
      all_files: ${{ steps.dag.outputs.all_files }}
      has_files: ${{ steps.dag.outputs.has_files }}
      has_updates: ${{ steps.summary.outputs.has_updates }}
      has_conflicts: ${{ steps.summary.outputs.has_conflicts }}
      has_unused: ${{ steps.summary.outputs.has_unused }}
      has_changes: ${{ steps.summary.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install analysis tools
        run: |
          pip install --require-hashes -r pip-requirements.txt
          pip install --require-hashes -r requirements-dev.txt

      - name: Build compile DAG
        id: dag
        run: python3 scripts/ci/requirements-maintenance/build_dag.py

      - name: Detect unused packages
        if: steps.dag.outputs.has_files == 'true'
        continue-on-error: true
        run: |
          mkdir -p "${{ runner.temp }}/reports"
          deptry --version
          deptry . --verbose \
            --json-output "${{ runner.temp }}/reports/deptry.json" \

      - name: Check for newer versions
        if: steps.dag.outputs.has_files == 'true'
        env:
          ALL_FILES: ${{ steps.dag.outputs.all_files }}
          REPORTS_DIR: ${{ runner.temp }}/reports
        run: python3 scripts/ci/requirements-maintenance/check_updates.py

      - name: Check per-environment conflicts
        if: steps.dag.outputs.has_files == 'true'
        env:
          ALL_FILES: ${{ steps.dag.outputs.all_files }}
          REPORTS_DIR: ${{ runner.temp }}/reports
        continue-on-error: true
        run: python3 scripts/ci/requirements-maintenance/check_conflicts.py

      - name: Summarise findings
        id: summary
        if: steps.dag.outputs.has_files == 'true'
        env:
          REPORTS_DIR: ${{ runner.temp }}/reports
        run: python3 scripts/ci/requirements-maintenance/summarise.py

      - name: Upload analysis reports
        if: always() && steps.dag.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-analysis
          path: /tmp/reports/
          retention-days: 14

  apply-fixes:
    name: Apply dependency fixes
    needs: [ analyse ]
    if: |
      always() &&
      needs.analyse.result == 'success' &&
      (needs.analyse.outputs.has_updates == 'true' || needs.analyse.outputs.has_conflicts == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install maintenance tools
        run: |
          pip install --require-hashes -r pip-requirements.txt
          pip install --require-hashes -r requirements-dev.txt

      - name: Recompile requirements
        env:
          ORDERED_GROUPS: ${{ needs.analyse.outputs.ordered_groups }}
        run: python3 scripts/ci/requirements-maintenance/recompile.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit to PR branch
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): recompile requirements"
          git push

      - name: Open fix PR
        if: steps.diff.outputs.changed == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: deps/recompile-requirements
          commit-message: "chore(deps): recompile requirements"
          title: "chore(deps): recompile requirements"
          body: |
            Automated recompilation of requirements files.

            Triggered by: ${{ github.event_name }} on `${{ github.ref_name }}`

            Resolves available updates and dependency conflicts detected by the analysis job.
          labels: dependencies
          delete-branch: true

  ci-success:
    name: Ran Dependency Analysis
    needs: [ changes, analyse, apply-fixes ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no upstream failures
        run: |
          CHANGES_RESULT="${{ needs.changes.result }}"
          ANALYSE_RESULT="${{ needs.analyse.result }}"
          APPLY_RESULT="${{ needs.apply-fixes.result }}"
          echo "changes:  $CHANGES_RESULT"
          echo "analyse:  $ANALYSE_RESULT"
          echo "apply-fixes:  $APPLY_RESULT"
          if [ "$CHANGES_RESULT" == "failure" ] || \
             [ "$ANALYSE_RESULT" == "failure" ] || \
             [ "$APPLY_RESULT" == 'failure' ]; then
            echo "::error::An upstream job failed"
            exit 1
          fi

      - name: Verify analysis is clean
        if: needs.analyse.result == 'success'
        run: |
          HAS_UPDATES="${{ needs.analyse.outputs.has_updates }}"
          HAS_CONFLICTS="${{ needs.analyse.outputs.has_conflicts }}"
          echo "has_updates:   $HAS_UPDATES"
          echo "has_conflicts: $HAS_CONFLICTS"

          FAILED=0
          if [ "$HAS_UPDATES" = "true" ]; then
            echo "::error::Dependency updates are available — see the dependency-analysis artifact"
            FAILED=1
          fi
          if [ "$HAS_CONFLICTS" = "true" ]; then
            echo "::error::Dependency conflicts detected — see the dependency-analysis artifact"
            FAILED=1
          fi
          exit $FAILED
