name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
    cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src == 'true' || steps.filter.outputs.all == 'true' }}
      backend: ${{ steps.filter.outputs.backend == 'true' || steps.filter.outputs.all == 'true' }}
      frontend: ${{ steps.filter.outputs.frontend == 'true' || steps.filter.outputs.all == 'true' }}
      any: ${{ steps.filter.outputs.changes != '[]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            all:
              - 'compose.yml'
            src:
              - 'docker/Dockerfile.tests'
              - 'src/**'
            backend:
              - 'backend/**'
              - 'docker/Dockerfile.backend'
              - 'src/**'
            frontend:
              - 'docker/Dockerfile.frontend'
              - 'frontend/**'

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'

    env:
      # Required by compose.yml
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6380"
      REDIS_INSIGHT_PORT: "5540"
      REDIS_DB: "0"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0
        with:
          version: v2.40.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Build test images via bake
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          files: docker/docker-bake.hcl
          targets: tests
          load: true

      - name: Create backend .env
        run: |
          cat > backend/.env << EOF
          DJANGO_SETTINGS_MODULE=config.settings.dev
          DJANGO_SECRET_KEY=ci-insecure-key-not-for-prod
          REDIS_HOST=redis
          REDIS_PORT=6380
          REDIS_DB=0
          EOF

      - name: Write compose override
        run: |
          cat > compose.ci.yml <<'EOF'
          services:
            test-runner:
              build: !reset null
              command: >
                -p pytest_cov
                --tb=long -v
                --continue-on-collection-errors
                --no-header
                --cov-report=term-missing
                --cov-report=xml:/home/health/test-output/coverage-src.xml
                --cov-fail-under=80
                --junit-xml=/home/health/test-output/test-results-src.xml
                -p no:warnings
              environment:
                - COVERAGE_FILE=/home/health/coverage-data/.coverage-src
              image: health-test-runner
              volumes:
                - ./test-output:/home/health/test-output
                - ./coverage-data:/home/health/coverage-data
            backend-test:
              build: !reset null
              command: >
                -p pytest_cov
                --tb=long -v
                --continue-on-collection-errors
                --no-header
                --cov-report=term-missing
                --cov-report=xml:/home/health/test-output/coverage-backend.xml
                --cov-fail-under=80
                --junit-xml=/home/health/test-output/test-results-backend.xml
                -p no:warnings
              environment:
                - COVERAGE_FILE=/home/health/coverage-data/.coverage-backend
              image: health-backend:test
              volumes:
                - ./test-output:/home/health/test-output
                - ./coverage-data:/home/health/coverage-data
              restart: on-failure
            frontend-test:
              build: !reset null
              command: >
                --coverage.reporter=lcov
                --coverage.reporter=text
                --coverage.reportsDirectory=/app/test-output/coverage-js
              image: health-frontend:test
              restart: on-failure
              user: root
              volumes:
                - ./test-output:/app/test-output
          EOF
          echo "COMPOSE_FILE=compose.yml:compose.ci.yml" >> "$GITHUB_ENV"

      - name: Prepare test output directory
        run: |
          mkdir -p test-output coverage-data
          sudo chown -R 1000:1000 test-output coverage-data

      - name: Run src tests
        id: test_runner
        if: always() && needs.changes.outputs.src == 'true'
        run: docker compose run test-runner

      - name: Run backend tests
        id: backend_tests
        if: always() && needs.changes.outputs.backend == 'true'
        run: docker compose run backend-test

      - name: Run frontend tests
        id: frontend_tests
        if: always() && needs.changes.outputs.frontend == 'true'
        run: docker compose run frontend-test

      - name: Upload JUnit test results
        if: always() && (steps.test_runner.conclusion != 'skipped' || steps.backend_tests.conclusion != 'skipped' || steps.frontend_tests.conclusion != 'skipped')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-output/test-results-*.xml
          retention-days: 30

      - name: Publish test results as PR check
        if: always() && github.event_name == 'pull_request' && (steps.test_runner.conclusion != 'skipped' || steps.backend_tests.conclusion != 'skipped' || steps.frontend_tests.conclusion != 'skipped')
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Test Report
          path: test-output/test-results-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage to Codecov
        if: always() && (steps.test_runner.conclusion != 'skipped' || steps.backend_tests.conclusion != 'skipped' || steps.frontend_tests.conclusion != 'skipped')
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            test-output/coverage-src.xml
            test-output/coverage-backend.xml
            test-output/coverage-js/lcov.info
          flags: integration,python,javascript
          fail_ci_if_error: false

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::src-test logs"
          docker compose logs test-runner || true
          echo "::endgroup::"
          echo "::group::backend-test logs"
          docker compose logs backend-test || true
          echo "::endgroup::"
          echo "::group::frontend-test logs"
          docker compose logs frontend-test || true
          echo "::endgroup::"
          echo "::group::compose ps"
          docker compose ps -a || true
          echo "::endgroup::"

      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v --remove-orphans || true

  ci-success:
    name: Passed Tests
    needs: [changes, tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.tests.result }}" == "failure" ]]; then
            exit 1
          fi
