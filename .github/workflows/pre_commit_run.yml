name: pre-commit

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      all_files:
        default: "true"
        description: "Run on all files (--all-files)?"
        options:
          - "true"
          - "false"
        required: false
        type: choice

permissions: {}

jobs:
  changes:
    name: Detect Changes
    outputs:
      code: ${{ steps.filter.outputs.code }}
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - "**"
              - "!**/*.md"
              - "!**/*.rst"
              - "!**/*.txt"
              - "!**/*.dockerignore"
              - "!**/*.gitignore"
              - "!.gitattributes"
              - "!LICENSE"
              - "!CHANGELOG"
              - "!NOTICE"

  pre-commit:
    name: Run pre-commit hooks
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          cache: "pip"
          python-version: "3.12"

      - name: Cache .venv
        id: venv-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: >-
            venv-${{ runner.os }}-py3.12-${{
            hashFiles(
            'pip-requirements.txt',
            'requirements-dev.txt',
            'src/requirements.txt',
            'backend/requirements/base.txt',
            'backend/requirements/tests.txt',
            'docs/requirements.txt'
            ) }}
          path: .venv

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          path: ~/.cache/pre-commit
          
      - name: Install Requirements
        run: |
          pip install --require-hashes -r pip-requirements.txt
          pip install --require-hashes -r requirements-dev.txt

      - name: Create .venv with dev dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --require-hashes -r pip-requirements.txt -q
          .venv/bin/pip install \
            --require-hashes \
            -r src/requirements.txt \
            -r requirements-dev.txt \
            -r backend/requirements/base.txt \
            -r backend/requirements/tests.txt \
            -r docs/requirements.txt \
            -q

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          node-version: '25'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run pre-commit (changed files only)
        if: github.event_name == 'pull_request'
        env:
          SKIP: compile-requirements
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pre-commit run \
            --from-ref  $BASE_SHA\
            --to-ref   $HEAD_SHA

      - name: Run pre-commit (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          ALL_FILES: "${{ inputs.all_files }}"
        run: |
          if [ "$ALL_FILES" == "true" ]; then
            echo "Running on all files..."
            pre-commit run --all-files
          else
            echo "Running on HEAD diff only..."
            pre-commit run --from-ref HEAD~1 --to-ref HEAD
          fi

  ci-success:
    name: Passed pre-commit
    if: always()
    needs: [changes, pre-commit]
    runs-on: ubuntu-latest

    steps:
      - name: Verify no failures
        env:
          CHANGES_RESULT: "${{ needs.changes.result }}"
          PRE_COMMIT_RESULT: "${{ needs.pre-commit.result }}"
        run: |
          if [[ "$CHANGES_RESULT" == "failure" ]] || \
             [[ "$PRE_COMMIT_RESULT" == "failure" ]]; then
            exit 1
          fi
