name: pre-commit

on:
  pull_request:
    # ── Negative filter: skip if ONLY these file types changed ──────────────
    # The workflow still runs if any non-listed file is touched alongside these.
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.txt"
      - ".gitignore"
      - ".gitattributes"
      - "LICENSE"
      - "CHANGELOG"
      - "NOTICE"
      - "docs/**"

  workflow_dispatch:
    inputs:
      all_files:
        description: "Run on all files (--all-files)?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# ── Concurrency: cancel in-progress run on same PR when new commit is pushed ──
# Falls back to run ID for push/dispatch events so those are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - "**"
              - "!**/*.md"
              - "!**/*.rst"
              - "!**/*.txt"
              - "!.gitignore"
              - "!.gitattributes"
              - "!LICENSE"
              - "!CHANGELOG"
              - "!NOTICE"
              - "!docs/**"

  pre-commit:
    name: Run pre-commit hooks
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache .venv
        id: venv-cache
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pip-requirements.txt', 'requirements-dev.txt', 'src/requirements.txt', 'backend/requirements/base.txt', 'backend/requirements/tests.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-

      - name: Install Requirements
        run: |
          pip install --require-hashes -r pip-requirements.txt
          pip install --require-hashes -r requirements-dev.txt

      - name: Create .venv with dev dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --require-hashes -r pip-requirements.txt -q
          .venv/bin/pip install \
            --require-hashes \
            -r src/requirements.txt \
            -r src/importer/requirements.txt \
            -r requirements-dev.txt \
            -r backend/requirements/base.txt \
            -r backend/requirements/tests.txt \
            -q

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run pre-commit (changed files only)
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run \
            --from-ref ${{ github.event.pull_request.base.sha }} \
            --to-ref   ${{ github.event.pull_request.head.sha }}

      - name: Run pre-commit (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.all_files }}" = "true" ]; then
            echo "Running on all files..."
            pre-commit run --all-files
          else
            echo "Running on HEAD diff only..."
            pre-commit run --from-ref HEAD~1 --to-ref HEAD
          fi

  ci-success:
    name: Passed pre-commit
    needs: [ changes, pre-commit ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]] || \
             [[ "${{ needs.pre-commit.result }}" == "failure" ]]; then
            exit 1
          fi
