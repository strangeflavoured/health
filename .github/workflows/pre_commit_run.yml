name: pre-commit

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      all_files:
        default: "true"
        description: "Run on all files (--all-files)?"
        options:
          - "true"
          - "false"
        required: false
        type: choice

permissions: {}

jobs:
  pre-commit:
    name: Run pre-commit hooks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          cache: "pip"
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cache .venv
        id: venv-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: >-
            uv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
          path: ~/.cache/uv

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          path: ~/.cache/pre-commit

      - name: Install Requirements
        run: uv sync --locked

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          node-version: '25'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run pre-commit (pull_request)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          uv run pre-commit run \
            --from-ref  $BASE_SHA \
            --to-ref   $HEAD_SHA

      - name: Run pre-commit (push)
        if: github.event_name == 'push'
        env:
          SKIP: no-commit-to-branch
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.event.after }}
        run: |
          uv run pre-commit run \
            --from-ref  $BASE_SHA \
            --to-ref   $HEAD_SHA

      - name: Run pre-commit (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          ALL_FILES: "${{ inputs.all_files }}"
        run: |
          if [ "$ALL_FILES" == "true" ]; then
            echo "Running on all files..."
            uv run pre-commit run --all-files
          else
            echo "Running on HEAD diff only..."
            uv run pre-commit run --from-ref HEAD~1 --to-ref HEAD
          fi
