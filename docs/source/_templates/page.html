{% extends "!page.html" %}
{% block extrahead %}
    {{ super() }}
    <style>
    /* fix badge vertical alignment from included README */
    img[src*="shields.io"],
    img[src*="badge"] {
      vertical-align: middle;
    }

    #version-warning {
      background: #fff3cd;
      color: #664d03;
      border-bottom: 1px solid #ffecb5;
      padding: 0.6em 1em;
      text-align: center;
      font-size: 0.9em;
    }
    body.dark #version-warning {
      background: #3a2f00;
      color: #ffe69c;
      border-bottom-color: #5a4a00;
    }
    #version-warning a {
      color: inherit;
      text-decoration: underline;
    }
    #version-switcher {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 0.5em 0 0.75em;
      margin: 0.5em 0;
      background: var(--color-sidebar-background, var(--color-background-secondary));
      border-bottom: 1px solid var(--color-background-border);
      font-size: 0.9em;
    }
    #version-switcher label {
      position: static;
      display: block;
      margin-bottom: 0.3em;
      font-weight: 600;
    }
    #version-switcher select {
      box-sizing: border-box;
      background: var(--color-background-secondary);
      color: var(--color-foreground-primary);
      border: 1px solid var(--color-background-border);
      border-radius: 4px;
      padding: 0.3em 0.5em;
      width: 100%;
    }
    </style>
{% endblock %}
{% block body %}
    <div id="version-warning" hidden></div>
    {{ super() }}
{% endblock %}
{% block left_sidebar %}
    {{ super() }}
    <div id="version-switcher" class="sidebar-tree" style="display:none">
        <label for="version-select"
               style="display: block;
                      margin-bottom: 0.3em;
                      font-weight: 600">Version</label>
        <select id="version-select" disabled>
            <option>{{ release }}</option>
        </select>
    </div>
    <script>
    (function () {
      var el     = document.getElementById("version-switcher");
      var sticky = document.querySelector(".sidebar-sticky");
      if (el && sticky) {
        sticky.insertBefore(el, sticky.firstChild);
        el.style.display = "";
      }
    })();
    </script>
{% endblock %}
{% block footer %}
    {{ super() }}
    <script>
    (function () {
      const CURRENT = "{{ release }}";
      const VERSIONS_URL = "/health/versions.json";
      const BASE = "/health/";

      fetch(VERSIONS_URL, { cache: "no-cache" })
        .then((r) => r.json())
        .then((data) => {
          renderSwitcher(data);
          renderWarning(data);
        })
        .catch((err) => console.warn("version switcher: failed to load", err));

      function renderSwitcher(data) {
        const sel = document.getElementById("version-select");
        sel.innerHTML = "";
        sel.disabled = false;
        for (const v of data.versions) {
          const opt = document.createElement("option");
          opt.value = BASE + v + "/";
          let label = v;
          if (v === data.latest) label += " (latest)";
          if (v === data.stable) label += " (stable)";
          opt.textContent = label;
          if (v === CURRENT) opt.selected = true;
          sel.appendChild(opt);
        }
        sel.addEventListener("change", () => {
          const url = new URL(sel.value, window.location.origin);
          if (url.origin === window.location.origin) {
            window.location.href = url.pathname;
          }
        });
      }

      function renderWarning(data) {
        const banner = document.getElementById("version-warning");
        let msg = null;
        let linkVersion = null;

        if (
          data.stable &&
          CURRENT !== data.stable &&
          data.versions.includes(CURRENT)
        ) {
          if (CURRENT === data.latest) {
            msg = [
              "You are viewing the latest development docs (",
              CURRENT,
              "). For the stable release, see ",
            ];
            linkVersion = data.stable;
          } else {
            msg = [
              "You are viewing docs for ",
              CURRENT,
              ", which is not the stable release. The stable release is ",
            ];
            linkVersion = data.stable;
          }
        } else if (!data.stable && CURRENT === data.latest) {
          msg = [
            "You are viewing pre-release docs (",
            CURRENT,
            "). No stable release yet.",
          ];
        } else if (CURRENT !== data.latest && data.versions.includes(CURRENT)) {
          msg = [
            "You are viewing docs for ",
            CURRENT,
            ". The latest version is ",
          ];
          linkVersion = data.latest;
        }

        if (!msg) return;

        const fragment = document.createDocumentFragment();

        fragment.appendChild(document.createTextNode(msg[0]));

        const strong = document.createElement("strong");
        strong.textContent = msg[1];
        fragment.appendChild(strong);

        if (msg[2] !== undefined) {
          fragment.appendChild(document.createTextNode(msg[2]));
        }

        if (linkVersion) {
          const a = document.createElement("a");
          a.href = BASE + linkVersion + "/";
          a.textContent = linkVersion;
          fragment.appendChild(a);
          fragment.appendChild(document.createTextNode("."));
        }

        banner.hidden = false;
        banner.appendChild(fragment);
      }
    })();
    </script>
{% endblock %}
