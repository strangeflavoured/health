repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args:
          - --target-version
          - py312
          - --exit-non-zero-on-fix
          - --fix
          - --show-fixes
        exclude: "docs/"
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args:
          - "--exclude"
          - "**/tests.py,**/test_*.py,**/*_tests.py,**/conftest.py"

  - repo: https://github.com/fpgmaas/deptry
    rev: 0.25.1
    hooks:
      - id: deptry
        language: system
        entry: .venv/bin/deptry .

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: [ "--severity=warning" ]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [ "-i", "2", "-ci" ]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd frontend && npx eslint --no-warn-ignored --max-warnings=0 .'
        files: ^frontend/.*\.(js|jsx)$
        pass_filenames: false

      - id: prettier
        name: prettier
        language: node
        entry: npx prettier
        args: [ --write ]
        files: \.(js|jsx|css|json|md)$
        types: [ file ]
        additional_dependencies:
          - prettier
