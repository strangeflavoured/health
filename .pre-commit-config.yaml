repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: no-commit-to-branch
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: [--exit-non-zero-on-fix, --fix, --show-fixes]
      - id: ruff-format

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci"]

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt

  - repo: local
    hooks:
      - id: deptry
        name: deptry
        entry: uvx deptry@0.25.1 .
        language: system
        pass_filenames: false
        files: \.(py|toml)$

      - id: vulture
        name: vulture
        entry: uvx vulture@2.16
        language: system
        types: [python]

      - id: yamllint
        name: yamllint
        entry: uvx yamllint@1.38.0
        args: [--format, parsable, --strict]
        language: system
        types: [yaml]

      - id: gitlint
        name: gitlint
        entry: uvx gitlint@0.19.1
        language: system
        stages: [commit-msg]
        pass_filenames: false

      - id: djlint
        name: Jinja template formatting (docs)
        entry: uvx djlint@1.36.4
        args: [--reformat]
        language: system
        files: \.html$

      - id: sphinx-lint
        name: RST lint (docs)
        entry: uvx sphinx-lint@1.0.0
        language: system
        files: \.rst$

      - id: dco-signoff
        name: DCO sign-off
        entry: .git-hooks/commit-msg-dco.sh
        language: script
        stages: [commit-msg]

      - id: eslint
        name: ESLint (frontend)
        additional_dependencies:
          - eslint
          - eslint-plugin-jsdoc
          - "@typescript-eslint/eslint-plugin"
          - "@typescript-eslint/parser"
        entry: >-
          bash -c 'cd frontend && npx eslint --no-warn-ignored --max-warnings 0 .'
        files: ^frontend/.*\.(ts|tsx)$
        language: node
        pass_filenames: false

      - id: npm-audit
        name: npm audit (frontend)
        entry: bash -c 'cd frontend && npm audit --audit-level=moderate'
        files: ^frontend/package.*\.json$
        language: node
        pass_filenames: false

      - id: prettier
        name: prettier
        additional_dependencies:
          - prettier
        entry: npx prettier
        args: [--write]
        files: \.(js|jsx|ts|tsx|css|json|md)$
        language: node
        types: [file]

      - id: typecheck
        name: TypeScript type check
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        files: ^frontend/.*\.(ts|tsx)$
        language: node
        pass_filenames: false
