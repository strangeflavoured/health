repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: double-quote-string-fixer
      - id: end-of-file-fixer
      - id: no-commit-to-branch
      - id: pretty-format-json
      - id: trailing-whitespace

  - repo: https://github.com/fpgmaas/deptry
    rev: 0.25.1
    hooks:
      - id: deptry
        entry: .venv/bin/deptry .
        language: system

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args:
          - --target-version
          - py312
          - --exit-non-zero-on-fix
          - --fix
          - --show-fixes
      - id: ruff-format

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci"]

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--format, parsable, --strict]

  - repo: local
    hooks:
      - id: compile-requirements
        entry: scripts/compile-requirements.sh
        files: \.in$
        language: script
        name: Recompile requirements (.in → .txt)
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      - id: dco-signoff
        name: DCO sign-off
        language: script
        entry: .git-hooks/commit-msg-dco.sh
        stages: [commit-msg]
        pass_filenames: false

      - id: djlint
        additional_dependencies:
          - djlint
        args: [--reformat]
        entry: djlint
        files: \.html$
        language: python
        name: Jinja template formatting (docs)

      - id: eslint
        additional_dependencies:
          - eslint
          - eslint-plugin-jsdoc
          - "@typescript-eslint/eslint-plugin"
          - "@typescript-eslint/parser"
        entry: >-
          bash -c 'cd frontend && npx eslint --no-warn-ignored --max-warnings 0 .'
        files: ^frontend/.*\.(ts|tsx)$
        language: node
        name: ESLint (frontend)
        pass_filenames: false

      - id: npm-audit
        entry: bash -c 'cd frontend && npm audit --audit-level=moderate'
        files: ^frontend/package.*\.json$
        language: node
        name: npm audit (frontend)
        pass_filenames: false

      - id: prettier
        additional_dependencies:
          - prettier
        args: [--write]
        entry: npx prettier
        files: \.(js|jsx|ts|tsx|css|json|md)$
        language: node
        name: prettier
        types: [file]

      - id: sphinx-lint
        additional_dependencies:
          - sphinx-lint
        entry: sphinx-lint
        files: \.rst$
        language: python
        name: RST lint (docs)

      - id: typecheck
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        files: ^frontend/.*\.(ts|tsx)$
        language: node
        name: TypeScript type check
        pass_filenames: false
