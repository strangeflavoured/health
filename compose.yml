services:
  redis:
    build:
      context: .
      dockerfile: docker/Dockerfile.redis
    container_name: health-redis
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_PORT:?REDIS_PORT must be set}:6380"
    volumes:
      - redis-data:/data
      - ${CA_PATH}:/certs/${REDIS_CA_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_SERVER_CERT}:/certs/${REDIS_SERVER_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_SERVER_KEY}:/certs/${REDIS_SERVER_KEY}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_HEALTHCHECK_CERT}:/certs/${REDIS_HEALTHCHECK_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_HEALTHCHECK_KEY}:/certs/${REDIS_HEALTHCHECK_KEY}:ro
    environment:
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD}
        --tls-port 6380
        --port 0
        --tls-cert-file /certs/${REDIS_SERVER_CERT}
        --tls-key-file /certs/${REDIS_SERVER_KEY}
        --tls-ca-cert-file /certs/${REDIS_CA_CERT}
        --tls-auth-clients yes
        --appendonly yes
        --maxmemory 900mb
        --maxmemory-policy allkeys-lfu
        --loglevel notice
      REDIS_KEY_PASSPHRASE: ${KEY_PASSPHRASE_INFRA}
      REDIS_SERVER_KEY: ${REDIS_SERVER_KEY}
      REDIS_CA_CERT: ${REDIS_CA_CERT}
      REDIS_HEALTHCHECK_CERT: ${REDIS_HEALTHCHECK_CERT}
      REDIS_HEALTHCHECK_KEY: ${REDIS_HEALTHCHECK_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/seccomp-redis.json
      - apparmor:docker-default
    tmpfs:
      - /run/secrets:size=1m,mode=0700,uid=1000
    deploy:
      resources:
        limits:
          cpus: "0.50"      # max. 1 core
          memory: 1G        # hard limit
        reservations:       # guaranteed
          cpus: "0.10"
          memory: 256M

  redisinsight:
    build:
      context: .
      dockerfile: docker/Dockerfile.redisinsight
    container_name: health-redisinsight
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_INSIGHT_PORT:?REDIS_INSIGHT_PORT must be set}:5540"
    volumes:
      - redisinsight-data:/data
      - ${CA_PATH}:/certs/${REDIS_CA_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_REDISINSIGHT_CERT}:/certs/${REDIS_REDISINSIGHT_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_REDISINSIGHT_KEY}:/certs/${REDIS_REDISINSIGHT_KEY}:ro
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  sandbox:
    container_name: health-sandbox
    build:
      context: .
      dockerfile: docker/Dockerfile.scripts
    env_file:
      - .env
    environment:
      REDIS_HOST: "redis"
      REDIS_CERTS_DIR: "/certs"
    volumes:
      - ./output:/home/health/output
      - ${CA_PATH}:/certs/${REDIS_CA_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_APP_CERT}:/certs/${REDIS_APP_CERT}:ro
      - ${REDIS_CERTS_DIR}/${REDIS_APP_KEY}:/certs/${REDIS_APP_KEY}:ro
    restart: no

  test-runner:
    container_name: health-test-suite
    build:
      context: .
      dockerfile: docker/Dockerfile.tests
    restart: no

  docs-compiler:
    container_name: health-docs
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    volumes:
      - ./docs/build:/home/health/docs/build
    restart: no

volumes:
  redis-data:
    driver: local
  redisinsight-data:
    driver: local
