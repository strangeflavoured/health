services:
  redis:
    build:
      context: .
      dockerfile: docker/Dockerfile.redis
    container_name: health-redis
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_PORT:?REDIS_PORT must be set}:6380"
    volumes:
      - redis-data:/data
        # passwords and passphrases
      - ${SECRETS_DIR}/admin_password:/run/secrets/admin_password:ro
      - ${SECRETS_DIR}/app_password:/run/secrets/app_password:ro
      - ${SECRETS_DIR}/insight_password:/run/secrets/insight_password:ro
      - ${SECRETS_DIR}/healthcheck_password:/run/secrets/healthcheck_password:ro
      - ${SECRETS_DIR}/key_passphrase_infra:/run/secrets/key_passphrase:ro
        # mTLS certificates and keys
      - ${CA_PATH}:/run/secrets/ca.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_SERVER_CERT}:/run/secrets/server.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_SERVER_KEY}:/run/secrets/server.key:ro
      - ${REDIS_CERTS_DIR}/${REDIS_HEALTHCHECK_CERT}:/run/secrets/healthcheck.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_HEALTHCHECK_KEY}:/run/secrets/healthcheck.key:ro
    environment:
      REDIS_ARGS: >-
        --tls-port 6380
        --port 0
        --tls-auth-clients yes
        --appendonly yes
        --maxmemory 900mb
        --maxmemory-policy allkeys-lfu
        --loglevel notice
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/seccomp-redis.json
      - apparmor:docker-default
    tmpfs:
      - /run/secrets_rw:size=1m,mode=0700,uid=1000
      - /run/secrets:ro
    deploy:
      resources:
        limits:
          cpus: "0.50"      # max. 1 core
          memory: 1G        # hard limit
        reservations:       # guaranteed
          cpus: "0.10"
          memory: 256M

  redisinsight:
    build:
      context: .
      dockerfile: docker/Dockerfile.redisinsight
    container_name: health-redisinsight
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_INSIGHT_PORT:?REDIS_INSIGHT_PORT must be set}:5540"
    volumes:
      - redisinsight-data:/data
      - ${CA_PATH}:/run/secrets/ca.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_REDISINSIGHT_CERT}:/run/secrets/redisinsight.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_REDISINSIGHT_KEY}:/run/secrets/redisinsight.key:ro
    tmpfs:
      - /run/secrets:ro
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      redis:
        condition: service_healthy

  sandbox:
    container_name: health-sandbox
    build:
      context: .
      dockerfile: docker/Dockerfile.scripts
    environment:
      REDIS_HOST: "redis"
      REDIS_CERTS_DIR: "/run/secrets"
      REDIS_PORT: $REDIS_PORT
      REDIS_DB: $REDIS_DB
    volumes:
      - ./output:/home/health/output
      - ${SECRETS_DIR}/app_password:/run/secrets/app_password:ro
      - ${CA_PATH}:/run/secrets/ca.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_APP_CERT}:/run/secrets/app.pem:ro
      - ${REDIS_CERTS_DIR}/${REDIS_APP_KEY}:/run/secrets/app.key:ro
    tmpfs:
      - /run/secrets:ro
    restart: no

  test-runner:
    container_name: health-test-suite
    build:
      context: .
      dockerfile: docker/Dockerfile.tests
    restart: no

  docs-compiler:
    container_name: health-docs
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    volumes:
      - ./docs/build:/home/health/docs/build
    restart: no

volumes:
  redis-data:
    driver: local
  redisinsight-data:
    driver: local
