services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: health-redis
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_PORT:?REDIS_PORT must be set}:6380"
    volumes:
      - redis-data:/data
      - ${REDIS_CERTS_DIR}:/certs:ro  # read-only
    environment:
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD}
        --tls-port 6380
        --port 0
        --tls-cert-file /certs/${REDIS_SERVER_CERT}
        --tls-key-file /certs/${REDIS_SERVER_KEY}
        --tls-ca-cert-file /certs/${REDIS_CA_CERT}
        --tls-auth-clients yes
        --appendonly yes
        --maxmemory 900mb
        --maxmemory-policy allkeys-lfu
        --loglevel notice
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"      # max. 1 core
          memory: 1G        # hard limit
        reservations:       # guaranteed
          cpus: "0.10"
          memory: 256M
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          redis-cli
          -p 6380
          --tls
          --cacert /certs/${REDIS_CA_CERT}
          --cert /certs/${REDIS_CLIENT_CERT}
          --key /certs/${REDIS_CLIENT_KEY}
          -a "$REDIS_PASSWORD"
          --no-auth-warning
          ping 2>/dev/null | grep -q PONG
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 10s

  redisinsight:
    image: redis/redisinsight:latest
    container_name: health-redisinsight
    ports:
      - "${REDIS_HOST:-127.0.0.1}:${REDIS_INSIGHT_PORT:?REDIS_INSIGHT_PORT must be set}:5540"
    volumes:
      - redisinsight-data:/data
      - ${REDIS_CERTS_DIR}:/certs:ro
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  sandbox:
    container_name: health-sandbox
    build:
      context: .
      dockerfile: scripts/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_HOST: "redis"
      REDIS_CERTS_DIR: "/certs"
    volumes:
      - ./output:/home/health/output
      - ${REDIS_CERTS_DIR}:/certs:ro
    restart: no

  test-runner:
    container_name: health-test-suite
    build:
      context: .
      dockerfile: tests/Dockerfile
    restart: no



volumes:
  redis-data:
    driver: local
  redisinsight-data:
    driver: local
